name: lux-renovate-intelligence

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/data/raw/uploads
      - backend_processed:/app/data/processed
    environment:
      PYTHONUNBUFFERED: "1"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      CORS_METHODS: ${CORS_METHODS:-GET,POST}
      CORS_HEADERS: ${CORS_HEADERS:-Content-Type,X-API-Key}
      API_AUTH_ENABLED: ${API_AUTH_ENABLED:-true}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:?Set API_AUTH_TOKEN in your environment or .env before starting compose}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MOCK_MODE: ${LLM_MOCK_MODE:-true}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_RESPONSE_FORMAT: ${LLM_RESPONSE_FORMAT:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-180}
      EXTERNAL_API_MAX_ATTEMPTS: ${EXTERNAL_API_MAX_ATTEMPTS:-3}
      EXTERNAL_API_RETRY_DELAY_SECONDS: ${EXTERNAL_API_RETRY_DELAY_SECONDS:-0.25}
      SEMANTIC_REVIEW_PROVIDER: ${SEMANTIC_REVIEW_PROVIDER:-disabled}
      SEMANTIC_REVIEW_API_KEY: ${SEMANTIC_REVIEW_API_KEY:-}
      SEMANTIC_REVIEW_BASE_URL: ${SEMANTIC_REVIEW_BASE_URL:-}
      SEMANTIC_REVIEW_MODEL: ${SEMANTIC_REVIEW_MODEL:-}
      SEMANTIC_REVIEW_RESPONSE_FORMAT: ${SEMANTIC_REVIEW_RESPONSE_FORMAT:-json_object}
      SEMANTIC_REVIEW_TIMEOUT_SECONDS: ${SEMANTIC_REVIEW_TIMEOUT_SECONDS:-120}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app/frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_API_AUTH_TOKEN: ${API_AUTH_TOKEN:?Set API_AUTH_TOKEN in your environment or .env before starting compose}
      VITE_API_TIMEOUT_MS: ${VITE_API_TIMEOUT_MS:-240000}
    depends_on:
      - backend

volumes:
  backend_uploads:
  backend_processed:

